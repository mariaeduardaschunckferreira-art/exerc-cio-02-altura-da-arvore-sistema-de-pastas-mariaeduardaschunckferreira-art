name: Autograding Tests

on:
  push:
  repository_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ex01 - classe + compilacao
        id: ex01
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ex01 - classe + compilacao
          setup-command: ""
          command: >
            test -f Ex01AlturaDaArvore.java &&
            grep -Eq "^[[:space:]]*(public[[:space:]]+)?class[[:space:]]+Ex01AlturaDaArvore([[:space:]]|$)" Ex01AlturaDaArvore.java &&
            javac Ex01AlturaDaArvore.java
          timeout: 10
          max-score: 10

      - name: Ex02 - classe + compilacao
        id: ex02
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ex02 - classe + compilacao
          setup-command: ""
          command: >
            test -f Ex02ProfundidadeDoNo.java &&
            grep -Eq "^[[:space:]]*(public[[:space:]]+)?class[[:space:]]+Ex02ProfundidadeDoNo([[:space:]]|$)" Ex02ProfundidadeDoNo.java &&
            javac Ex02ProfundidadeDoNo.java
          timeout: 10
          max-score: 10

      - name: Ex03 - classe + compilacao
        id: ex03
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ex03 - classe + compilacao
          setup-command: ""
          command: >
            test -f Ex03AlturaDeUmNo.java &&
            grep -Eq "^[[:space:]]*(public[[:space:]]+)?class[[:space:]]+Ex03AlturaDeUmNo([[:space:]]|$)" Ex03AlturaDeUmNo.java &&
            javac Ex03AlturaDeUmNo.java
          timeout: 10
          max-score: 10

      - name: Ex04 - classe + compilacao
        id: ex04
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ex04 - classe + compilacao
          setup-command: ""
          command: >
            test -f Ex04BuscaEmABB.java &&
            grep -Eq "^[[:space:]]*(public[[:space:]]+)?class[[:space:]]+Ex04BuscaEmABB([[:space:]]|$)" Ex04BuscaEmABB.java &&
            javac Ex04BuscaEmABB.java
          timeout: 10
          max-score: 10

      - name: Ex05 - classe + compilacao
        id: ex05
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Ex05 - classe + compilacao
          setup-command: ""
          command: >
            test -f Ex05PreOrdem.java &&
            grep -Eq "^[[:space:]]*(public[[:space:]]+)?class[[:space:]]+Ex05PreOrdem([[:space:]]|$)" Ex05PreOrdem.java &&
            javac Ex05PreOrdem.java
          timeout: 10
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          EX01_RESULTS: "${{ steps.ex01.outputs.result }}"
          EX02_RESULTS: "${{ steps.ex02.outputs.result }}"
          EX03_RESULTS: "${{ steps.ex03.outputs.result }}"
          EX04_RESULTS: "${{ steps.ex04.outputs.result }}"
          EX05_RESULTS: "${{ steps.ex05.outputs.result }}"
        with:
          runners: ex01,ex02,ex03,ex04,ex05
